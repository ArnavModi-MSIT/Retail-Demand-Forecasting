services:
  app:
    build: .
    container_name: retail_forecast_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # Internal Docker network — containers reach each other by service
      # name, not localhost, and on the container's own port (not the
      # host-mapped 5433 used for local non-Docker development).
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-retail_forecast}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: retail_forecast_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-retail_forecast}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_layer/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: